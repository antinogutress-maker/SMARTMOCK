<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loksewa Exam Prep - MCQ Dashboard</title>
    <style>
        /* --- CSS: Beautiful & Modern Styling --- */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --background-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 40px 20px 60px 20px; /* Extra bottom padding for the dropdown overlap */
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Custom Dropdown Styling --- */
        .filter-container {
            margin: -30px auto 30px auto;
            max-width: 500px;
            position: relative;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        select {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            background-color: transparent;
            border: 2px solid transparent;
            border-radius: 12px;
            appearance: none; /* Removes default browser arrow */
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s ease;
        }

        select:focus {
            border-color: var(--secondary-color);
        }

        /* Custom Arrow for Dropdown */
        .filter-container::after {
            content: '▼';
            font-size: 0.9rem;
            color: var(--primary-color);
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* --- Grid & Button/Card Styling --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            border-left: 5px solid var(--primary-color);
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
            background: linear-gradient(to right, #ffffff, #f8fafc);
        }

        .quiz-icon {
            background: #e0e7ff;
            color: var(--primary-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .quiz-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #status-message {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sub-Engineer MCQ Hub</h1>
        <p>Select your target province or level to start</p>
    </header>

    <div class="container">
        <div class="filter-container">
            <select id="regionFilter">
                <option value="all">Show All Mock Tests</option>
                <option value="federal">Federal Level</option>
                <option value="gandaki">Gandaki Province</option>
                <option value="bagmati">Bagmati Province</option>
                <option value="lumbini">Lumbini Province</option>
                <option value="koshi">Koshi Province</option>
                <option value="madhesh">Madhesh Province</option>
                <option value="karnali">Karnali Province</option>
                <option value="sudurpashchim">Sudurpashchim Province</option>
            </select>
        </div>

        <div id="status-message">Loading your quizzes...</div>

        <div id="quiz-container" class="grid-container hidden">
            </div>
    </div>

    <script>
        /* --- JavaScript: Advanced Fetch & Filter Logic --- */
        
        // 🛑 IMPORTANT: UPDATE THESE WITH YOUR DETAILS 🛑
        const GITHUB_OWNER = 'antinogutress-maker'; 
        const GITHUB_REPO = 'SMARTMOCK';        
        const FOLDER_PATH = 'tests'; 
        
        const container = document.getElementById('quiz-container');
        const statusMessage = document.getElementById('status-message');
        const regionFilter = document.getElementById('regionFilter');
        let allQuizzes = []; 

        // Function to format the filename
        function formatTitle(filename) {
            let name = filename.replace('.html', '');
            name = name.replace(/[-_]/g, ' '); 
            return name.replace(/\b\w/g, char => char.toUpperCase()); 
        }

        // Fetch files from GitHub
        async function fetchQuizzes() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) {
                    throw new Error('Could not connect. Did you update your GitHub username and repo name in the script?');
                }

                const files = await response.json();
                allQuizzes = files.filter(file => file.name.endsWith('.html'));

                if (allQuizzes.length === 0) {
                    statusMessage.innerText = "No HTML files found in the 'data' folder.";
                    return;
                }

                statusMessage.classList.add('hidden');
                container.classList.remove('hidden');
                
                renderQuizzes(allQuizzes);

            } catch (error) {
                statusMessage.innerText = `Error: ${error.message}`;
                statusMessage.style.color = '#ef4444'; 
            }
        }

        // Render buttons to screen
        function renderQuizzes(quizArray) {
            container.innerHTML = ''; 

            quizArray.forEach((file, index) => {
                const formattedName = formatTitle(file.name);
                
                const card = document.createElement('a');
                card.className = 'quiz-card';
                card.href = `${FOLDER_PATH}/${file.name}`; 

                card.innerHTML = `
                    <div class="quiz-icon">${index + 1}</div>
                    <div class="quiz-title">${formattedName}</div>
                `;

                container.appendChild(card);
            });
        }

        // Dropdown Selection Logic
        regionFilter.addEventListener('change', (e) => {
            const selectedRegion = e.target.value.toLowerCase();
            
            const filteredQuizzes = allQuizzes.filter(file => {
                // If "Show All" is selected, return everything
                if (selectedRegion === 'all') return true;
                
                // Otherwise, check if the file name contains the selected province/level
                const title = formatTitle(file.name).toLowerCase();
                return title.includes(selectedRegion);
            });

            renderQuizzes(filteredQuizzes);

            // If a province is selected but no files exist for it yet
            if (filteredQuizzes.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: #fff; border-radius: 12px; color: #64748b;">
                        <h3>No tests uploaded yet!</h3>
                        <p style="margin-top: 10px;">Check back later for ${e.target.options[e.target.selectedIndex].text} mock tests.</p>
                    </div>`;
            }
        });

        // Initialize
        fetchQuizzes();
    </script>
</body>
</html>
