<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bagmati 5th Smart Test 05</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* [100% CLAYMORPHISM PALETTE & SHADOWS] */
        :root { 
            --primary: #FF3366; 
            --secondary: #FF9933; 
            --accent: #00E5FF; 
            
            /* Clay Base Color */
            --clay-bg: #E8F0F8; 
            
            /* Clay Outer Shadows */
            --clay-shadow-out: 12px 12px 24px rgba(166, 180, 200, 0.7), -12px -12px 24px #FFFFFF;
            
            /* Clay Inner Shadows (Puffy Effect) */
            --clay-shadow-in: inset 6px 6px 12px rgba(255, 255, 255, 0.9), inset -6px -6px 12px rgba(166, 180, 200, 0.4);
            
            /* Clay Pressed/Inset Shadows (For Inputs) */
            --clay-shadow-pressed: inset 6px 6px 12px rgba(166, 180, 200, 0.6), inset -6px -6px 12px #FFFFFF;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            /* Soft pastel gradient to complement the 3D clay */
            background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #C2E9FB, #EAE5C9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 100% Clay Container */
        .app-container { 
            width: 100%; 
            max-width: 650px; 
            background: var(--clay-bg); 
            border-radius: 40px; 
            padding: 2.5rem 2rem; 
            /* Double shadow system for 3D clay look */
            box-shadow: var(--clay-shadow-out), var(--clay-shadow-in);
            position: relative; 
            overflow: hidden; 
            transition: all 0.4s ease; 
        }
        
        h1 { font-size: 2.2rem; font-weight: 800; color: #1E293B; margin-bottom: 10px; }
        h2 { font-size: 1.6rem; margin-bottom: 20px; color: #334155; font-weight: 800; }
        p { color: #64748B; font-size: 1rem; line-height: 1.6; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; color: #64748B; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* Clay Inset Inputs */
        .glass-input { 
            width: 100%; 
            padding: 18px; 
            background: var(--clay-bg); 
            border: none; 
            border-radius: 20px; 
            color: #1E293B; 
            font-size: 1.05rem; 
            font-weight: 600;
            outline: none; 
            transition: 0.3s;
            box-shadow: var(--clay-shadow-pressed);
        }
        .glass-input:focus { 
            box-shadow: inset 8px 8px 16px rgba(166, 180, 200, 0.7), inset -8px -8px 16px #FFFFFF, 0 0 0 4px rgba(0, 229, 255, 0.3);
        }
        .glass-input::placeholder { color: #94A3B8; }
        .glass-input:read-only { background: #DFE7F0; color: #64748B; cursor: not-allowed; }
        select.glass-input option { background: #FFFFFF; color: #1E293B; }
        
        /* Clay Puffy Button */
        .btn { 
            background: var(--primary); 
            border: none; 
            color: white; 
            padding: 18px; 
            width: 100%; 
            border-radius: 24px; 
            font-size: 1.15rem; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 25px; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            min-height: 55px; 
            box-shadow: 
                8px 8px 16px rgba(255, 51, 102, 0.3), 
                -4px -4px 10px #FFFFFF,
                inset 4px 4px 8px rgba(255,255,255,0.4),
                inset -4px -4px 8px rgba(0,0,0,0.1);
        }
        .btn:active { 
            transform: scale(0.95); 
            box-shadow: 
                2px 2px 5px rgba(255, 51, 102, 0.4), 
                inset 6px 6px 12px rgba(0,0,0,0.2),
                inset -2px -2px 6px rgba(255,255,255,0.2);
        }
        .btn:disabled { filter: grayscale(1); cursor: wait; opacity: 0.7; }
        
        .btn-outline { 
            background: var(--clay-bg); 
            color: #1E293B;
            box-shadow: var(--clay-shadow-out), var(--clay-shadow-in); 
            margin-top: 15px; 
        }
        
        .personal-header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .animate-praise { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .info-bar { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; 
            background: var(--clay-bg); 
            padding: 15px 20px; 
            border-radius: 20px; 
            box-shadow: var(--clay-shadow-pressed);
            font-weight: 700;
            color: #64748B;
        }
        .timer-badge { font-family: monospace; font-weight: 800; color: #FF3366; font-size: 1.3rem; }
        
        /* [REQUIRED] Question Text is ALWAYS Black */
        .question-text { 
            font-size: 1.35rem; 
            font-weight: 800; 
            margin-bottom: 25px; 
            line-height: 1.5; 
            color: #000000 !important; 
            padding: 10px 0;
        }
        
        /* [REQUIRED] Options with ALWAYS Blue Text and Clay Styling */
        .option-btn { 
            width: 100%; 
            padding: 18px 20px; 
            margin-bottom: 18px; 
            background: var(--clay-bg); 
            border: none; 
            border-radius: 24px; 
            text-align: left; 
            color: #0000FF !important; 
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            -webkit-user-select: none; user-select: none;
            
            /* Puffy Clay Shadow for Options */
            box-shadow: 
                6px 6px 14px rgba(166, 180, 200, 0.6), 
                -6px -6px 14px #FFFFFF,
                inset 3px 3px 6px rgba(255,255,255,0.9),
                inset -3px -3px 6px rgba(166, 180, 200, 0.3);
        }
        .option-btn:hover { transform: translateY(-3px); }
        .option-btn:active { transform: scale(0.96); box-shadow: var(--clay-shadow-pressed); }
        
        .option-marker { 
            width: 40px; height: 40px; 
            background: var(--clay-bg); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin-right: 18px; 
            font-weight: 800; 
            color: #0000FF !important; 
            flex-shrink: 0; 
            /* Pressed marker inside puffy button */
            box-shadow: var(--clay-shadow-pressed);
        }
        
        /* Correct/Wrong States - Only Background Changes, text remains Blue! */
        .correct { 
            background: #00FF88 !important; /* Green Background */
            box-shadow: 
                6px 6px 14px rgba(0, 255, 136, 0.4), 
                -4px -4px 10px #FFFFFF,
                inset 4px 4px 8px rgba(255,255,255,0.5),
                inset -4px -4px 8px rgba(0,0,0,0.1);
            transform: scale(1.02);
        }
        .correct .option-marker { background: rgba(255,255,255,0.3); }
        
        .wrong { 
            background: #FF3366 !important; /* Red Background */
            box-shadow: 
                6px 6px 14px rgba(255, 51, 102, 0.4), 
                -4px -4px 10px #FFFFFF,
                inset 4px 4px 8px rgba(255,255,255,0.4),
                inset -4px -4px 8px rgba(0,0,0,0.1);
        }
        .wrong .option-marker { background: rgba(255,255,255,0.3); }
        
        .explanation-box { 
            margin-top: 25px; padding: 20px; 
            background: var(--clay-bg); 
            border-left: 6px solid var(--accent); 
            border-radius: 20px; 
            font-size: 1.05rem; 
            color: #1E293B;
            font-weight: 600;
            display: none; 
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--clay-shadow-pressed);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        
        .score-circle { 
            width: 200px; height: 200px; 
            border-radius: 50%; 
            background: var(--clay-bg);
            margin: 0 auto 30px auto; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            /* Huge puffy clay ring */
            box-shadow: 
                15px 15px 30px rgba(166, 180, 200, 0.7), 
                -15px -15px 30px #FFFFFF,
                inset 8px 8px 16px rgba(255,255,255,0.9),
                inset -8px -8px 16px rgba(166, 180, 200, 0.4); 
        }
        .score-val { font-size: 4.5rem; font-weight: 800; color: #FF3366; line-height: 1; }
        .hidden { display: none !important; }
        #opts-list { max-height: 55vh; overflow-y: auto; padding-right: 12px; padding-bottom: 10px; padding-top: 5px; margin-left: -5px; padding-left: 5px;}
        
        /* Custom Scrollbar */
        #opts-list::-webkit-scrollbar { width: 8px; }
        #opts-list::-webkit-scrollbar-track { background: var(--clay-bg); border-radius: 10px; box-shadow: var(--clay-shadow-pressed); }
        #opts-list::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        
        #auth-msg { text-align: center; margin-top: 20px; font-weight: 700; color: #FF3366; background: var(--clay-bg); padding: 15px; border-radius: 16px; display: none; box-shadow: var(--clay-shadow-pressed); }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div id="view-login">

</div>

<script>
/**
 * --- UPDATED AUDIO HELPER SYSTEM ---
 * Uses Free Google Audio API + Browser Synthesis fallback
 */
const AudioHelper = {
    ctx: null,
    init: function() {
        if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if(this.ctx.state === 'suspended') this.ctx.resume();
        
        // Mobile warm-up
        if ('speechSynthesis' in window) {
            let warmupMsg = new SpeechSynthesisUtterance('');
            warmupMsg.volume = 0; 
            window.speechSynthesis.speak(warmupMsg);
        }
    },
    playTing: function() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'sine'; 
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1500, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
    },
    playFush: function() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    },
    speak: function(text) {
        // Free Google Translate TTS API (Human Sounding)
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=${encodeURIComponent(text)}`;
        const audio = new Audio(url);
        audio.play().catch(() => {
            // Fallback to robotic browser voice if blocked
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        });
    }
};

const App = {
    state: { user: null, quiz: [], curr: 0, score: 0, mistakes: [], timer: null, submitted: false },

    save: (k, v) => { try { localStorage.setItem(k, v) } catch(e) {} },
    load: (k) => { try { return localStorage.getItem(k) } catch(e) { return null } },

    verifyAndLogin: () => {
        const n = document.getElementById('inp-name').value.trim();
        const q = document.getElementById('inp-qual').value;
        const c = document.getElementById('inp-code').value.trim();
        const msg = document.getElementById('auth-msg');
        const btn = document.getElementById('btn-verify');

        if(!n || !c) {
            msg.innerText = "Code Changed, Contact admin  and Renew Subscription";
            msg.style.display = 'block'; return;
        }

        AudioHelper.init(); // Warm up audio

        btn.disabled = true; btn.innerText = "Verifying..."; msg.style.display = 'none';

        fetch(`${CFG.authScript}?code=${c}&name=${n}&qual=${q}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                document.getElementById('inp-pass').value = data.password;
                App.state.user = { name: n, qual: q, code: c };
                App.save(KEYS.user, JSON.stringify(App.state.user));
                setTimeout(() => App.dash(), 800);
            } else {
                btn.disabled = false; btn.innerText = "Verify & Login";
                msg.style.display = 'block'; msg.style.color = "#FF3366";
                msg.innerHTML = data.message.includes("used") ? "Code already used or expired." : "Invalid Code";
            }
        })
        .catch(() => {
            btn.disabled = false; btn.innerText = "Verify & Login";
            msg.style.display = 'block'; msg.innerText = "Connection Error";
        });
    },

    dash: () => {
        document.getElementById('title-display').innerText = CFG.topic;
        document.getElementById('dash-topic-display').innerText = CFG.topic;
        const stored = App.load(KEYS.user);
        if(!stored) return;
        App.state.user = JSON.parse(stored);
        document.getElementById('greet-msg').innerText = `Namaste, ${App.state.user.name.split(' ')[0]}!`;
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-result').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        
        if(App.load(KEYS.sent)) {
            document.getElementById('btn-start').innerText = "Retake (Practice Mode)";
            document.getElementById('submitted-msg').style.display = 'block';
            document.getElementById('submitted-msg').innerText = "✅ Previous Score Submitted";
        } else {
            document.getElementById('btn-start').innerText = "Start Exam";
            document.getElementById('submitted-msg').style.display = 'none';
        }
        const m = JSON.parse(App.load(KEYS.mistakes) || "[]");
        document.getElementById('btn-review').style.display = m.length > 0 ? 'inline-block' : 'none';
    },

    start: (review) => {
        AudioHelper.init(); // Warm up audio
        App.state.curr = 0; App.state.score = 0; App.state.mistakes = []; App.state.submitted = false;
        const prevM = JSON.parse(App.load(KEYS.mistakes) || "[]");
        const flatDB = DB.flat ? DB.flat() : DB;
        let source = review ? flatDB.filter(q => prevM.includes(q.id)) : [...flatDB];
        if(!source.length) return alert("No questions available.");

        App.state.quiz = source.map(q => {
            let opts = q.o.map((txt, i) => ({ t: txt, c: i === q.a }));
            return { ...q, shuffledOpts: opts.sort(() => Math.random() - 0.5) };
        }).sort(() => Math.random() - 0.5);

        document.getElementById('view-dash').classList.add('hidden');
        document.getElementById('view-quiz').classList.remove('hidden');
        document.getElementById('q-total').innerText = App.state.quiz.length;
        App.timer(45*60);
        App.render();
    },

    render: () => {
        const q = App.state.quiz[App.state.curr];
        document.getElementById('q-idx').innerText = App.state.curr + 1;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('btn-next').classList.add('hidden');
        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.shuffledOpts.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="option-marker">${String.fromCharCode(65+i)}</div>${opt.t}`;
            btn.onclick = () => App.check(btn, opt, q);
            list.appendChild(btn);
        });
    },

    check: (btn, opt, q) => {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => { b.onclick = null; b.style.opacity = '0.7'; b.style.transform = 'scale(0.98)'; b.style.boxShadow = 'var(--clay-shadow-pressed)'; });
        btn.style.opacity = '1';
        btn.style.transform = 'scale(1.02)';
        
        const praise = document.getElementById('praise-txt');
        praise.classList.remove('animate-praise');
        void praise.offsetWidth; praise.classList.add('animate-praise');
        const userName = App.state.user ? App.state.user.name.split(' ')[0] : 'Student';

        if(opt.c) {
            btn.classList.add('correct');
            App.state.score++;
            let rawTxt = PRAISE.good[Math.floor(Math.random()*PRAISE.good.length)];
            let finalTxt = rawTxt.replace('{name}', userName);
            praise.innerText = finalTxt;
            praise.style.color = "#00C853";
            AudioHelper.playTing();
            AudioHelper.speak(finalTxt);
            let m = JSON.parse(App.load(KEYS.mistakes) || "[]").filter(id => id !== q.id);
            App.save(KEYS.mistakes, JSON.stringify(m));
        } else {
            btn.classList.add('wrong');
            all.forEach((b, i) => { if(q.shuffledOpts[i].c) b.classList.add('correct'); });
            App.state.mistakes.push(q.id);
            let rawTxt = PRAISE.bad[Math.floor(Math.random()*PRAISE.bad.length)];
            let finalTxt = rawTxt.replace('{name}', userName);
            praise.innerText = finalTxt;
            praise.style.color = "#FF3366";
            AudioHelper.playFush();
            AudioHelper.speak(finalTxt);
        }

        if(q.e) {
            document.getElementById('exp-box').innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            document.getElementById('exp-box').style.display = 'block';
        }
        document.getElementById('btn-next').classList.remove('hidden');
    },

    next: () => {
        App.state.curr++;
        if(App.state.curr < App.state.quiz.length) App.render();
        else App.finish();
    },

    timer: (sec) => {
        if(App.state.timer) clearInterval(App.state.timer);
        App.state.timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(sec<=0) App.finish();
        }, 1000);
    },

    finish: () => {
        clearInterval(App.state.timer);
        document.getElementById('view-quiz').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
        let m = JSON.parse(App.load(KEYS.mistakes) || "[]");
        m = [...new Set([...m, ...App.state.mistakes])];
        App.save(KEYS.mistakes, JSON.stringify(m));
        const pct = Math.round((App.state.score / App.state.quiz.length) * 100);
        document.getElementById('res-score').innerText = App.state.score;
        document.getElementById('res-pct').innerText = `${pct}% Accuracy`;
        App.sync();
    },

    sync: () => {
        if(App.state.submitted || App.load(KEYS.sent)) return;
        App.state.submitted = true;
        const formData = new FormData();
        formData.append("name", App.state.user.name);
        formData.append("qualification", App.state.user.qual);
        formData.append("examTitle", CFG.topic);
        formData.append("score", App.state.score);
        if(navigator.onLine) {
            fetch(CFG.scoreScript, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => {
                App.save(KEYS.sent, "true");
                document.getElementById('sync-status').innerText = "✅ Score Saved!";
                document.getElementById('sync-status').style.color = "#00C853";
            }).catch(() => App.offline(formData));
        } else App.offline(formData);
    },

    offline: (d) => {
        let p = JSON.parse(App.load(KEYS.pending) || "[]");
        p.push(Object.fromEntries(d));
        App.save(KEYS.pending, JSON.stringify(p));
        document.getElementById('sync-status').innerText = "Saved offline.";
    }
};

window.onload = () => { if(App.load(KEYS.user)) App.dash(); };
</script>
</body>
</html>
