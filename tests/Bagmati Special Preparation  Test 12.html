<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> (HARD + SMART) ² </title>
    <style>
        :root {
            /* iOS Dark Mode System Colors */
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-gray: #1C1C1E;
            --ios-gray-light: #2C2C2E;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(40, 40, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            /* Native iOS Font Stack */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            /* Vibrant background to show off the glass blur */
            background-color: #000000;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(10, 132, 255, 0.35) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(88, 86, 214, 0.35) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(48, 209, 88, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Smooth iOS-like entrance animation */
        @keyframes springUp { 
            0% { opacity: 0; transform: translateY(40px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate { animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }

        .app-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Apple Style Frosted Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 32px; /* iOS standard squircle feel */
            padding: 35px 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px inset rgba(255,255,255,0.05);
        }

        .input-group { margin-bottom: 22px; }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            margin-left: 4px;
        }
        
        .glass-input, .glass-select {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid transparent;
            border-radius: 18px;
            color: var(--text-primary);
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .glass-input:focus, .glass-select:focus {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid var(--ios-blue);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.15);
        }
        
        .glass-input::placeholder { color: rgba(235, 235, 245, 0.3); }
        .glass-select option { background: #1C1C1E; color: white; }

        .btn {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .btn-primary { 
            background: var(--ios-blue); 
            color: #fff; 
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.3); 
        }
        .btn-mistake { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn-group { 
            background: var(--ios-green); 
            color: #fff; 
            text-decoration: none; 
            box-shadow: 0 8px 20px rgba(48, 209, 88, 0.2);
        }

        .q-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 20px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            color: var(--text-secondary);
        }
        
        .timer { 
            color: var(--text-primary); 
            background: rgba(255, 255, 255, 0.1); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-variant-numeric: tabular-nums; /* Prevents text jumping */
        }
        
        .question-text { 
            font-size: 1.25rem; 
            font-weight: 500; 
            line-height: 1.4; 
            margin-bottom: 25px; 
            letter-spacing: -0.02em;
        }
        
        .option {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            gap: 15px;
            font-weight: 400;
            font-size: 1.05rem;
        }
        .option:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.1); }
        
        /* iOS style correct/wrong states */
        .option.correct { 
            background: rgba(48, 209, 88, 0.15) !important; 
            border-color: var(--ios-green) !important; 
            color: var(--ios-green); 
        }
        .option.wrong { 
            background: rgba(255, 69, 58, 0.15) !important; 
            border-color: var(--ios-red) !important; 
            color: var(--ios-red); 
        }

        .feedback-text {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        .explanation {
            margin-top: 20px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-secondary);
            display: none;
            animation: springUp 0.4s ease forwards;
        }
        .explanation strong { color: var(--text-primary); display: block; margin-bottom: 5px;}

        .hidden { display: none !important; }

        .progress-bar { 
            width: 100%; 
            height: 8px; 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            margin-bottom: 25px; 
            overflow: hidden; 
        }
        .progress-fill { 
            height: 100%; 
            background: var(--ios-blue); 
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            border-radius: 10px;
        }

        /* Result View */
        #res-score {
            font-size: 4.5rem; 
            font-weight: 700; 
            color: var(--ios-blue); 
            margin-bottom: 5px;
            letter-spacing: -0.04em;
        }
        .res-stat { 
            font-size: 1rem; 
            color: var(--text-secondary); 
            margin-top: 5px; 
            font-weight: 500;
        }
        .advice-box { 
            margin-top: 30px; 
            padding: 22px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            line-height: 1.5; 
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
    </style>
</head>

    let state = {
        user: "",
        firstName: "",
        score: 0,
        idx: 0,
        time: CONFIG.timer,
        mistakes: JSON.parse(localStorage.getItem('mistakeBank')) || [],
        currentSet: [],
        timerInt: null
    };

    const engine = {
        login: () => {
            const user = document.getElementById('in-name').value;
            const pass = document.getElementById('in-pass').value;
            const qual = document.getElementById('in-qual').value;

            if(pass !== CONFIG.password) return alert("Incorrect Password!");
            if(!user || !qual) return alert("Please complete your profile!");
            
            state.user = user;
            state.firstName = user.split(' ')[0];
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dash').classList.remove('hidden');
            document.getElementById('dash-welcome').innerText = `Namaste, ${state.firstName}!`;
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
        },

        startTest: (reviewMode) => {
            if(QUESTIONS_DATA.length === 0 && !reviewMode) return alert("Question bank is empty!");
            
            state.score = 0;
            state.idx = 0;
            state.time = CONFIG.timer;
            
            if(reviewMode) {
                if(state.mistakes.length === 0) return alert("No mistakes to review!");
                state.currentSet = QUESTIONS_DATA.filter(q => state.mistakes.includes(q.id));
            } else {
                state.currentSet = [...QUESTIONS_DATA].sort(() => 0.5 - Math.random());
            }

            document.getElementById('q-total').innerText = state.currentSet.length;
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            engine.render();
            engine.timer();
        },

        render: () => {
            const q = state.currentSet[state.idx];
            document.getElementById('q-idx').innerText = state.idx + 1;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('feedback-msg').style.display = 'none';
            
            const optArea = document.getElementById('options-area');
            optArea.innerHTML = "";
            
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option animate';
                div.innerHTML = `<span>${String.fromCharCode(65+i)}.</span> ${opt}`;
                div.onclick = () => engine.check(i, div);
                optArea.appendChild(div);
            });

            document.getElementById('p-bar').style.width = `${((state.idx+1)/state.currentSet.length)*100}%`;
        },

        check: (choice, el) => {
            const q = state.currentSet[state.idx];
            const opts = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback-msg');
            opts.forEach(o => o.style.pointerEvents = 'none');

            const compliments = ["Amazing", "Wow", "Fantastic", "Well Done", "Lovely", "Superb", "Brilliant"];
            const motivation = ["Don't give up", "Keep trying", "You've got this", "Stay focused", "Almost there", "Keep going"];

            feedback.style.display = 'block';

            if(choice === q.a) {
                el.classList.add('correct');
                state.score++;
                state.mistakes = state.mistakes.filter(id => id !== q.id);
                
                const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
                feedback.innerText = `${randomComp}, ${state.firstName}!`;
                feedback.style.color = "var(--ios-green)";
            } else {
                el.classList.add('wrong');
                opts[q.a].classList.add('correct');
                if(!state.mistakes.includes(q.id)) state.mistakes.push(q.id);
                
                const randomMot = motivation[Math.floor(Math.random() * motivation.length)];
                feedback.innerText = `${randomMot}, ${state.firstName}!`;
                feedback.style.color = "var(--ios-red)";
            }
            
            if(q.e) {
                const exp = document.getElementById('explanation-box');
                exp.innerHTML = "<strong>Explanation</strong>" + q.e;
                exp.style.display = 'block';
            }

            localStorage.setItem('mistakeBank', JSON.stringify(state.mistakes));
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
            document.getElementById('next-btn').classList.remove('hidden');
        },

        next: () => {
            state.idx++;
            if(state.idx < state.currentSet.length) engine.render();
            else engine.end();
        },

        timer: () => {
            clearInterval(state.timerInt);
            state.timerInt = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60);
                let s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(state.time <= 0) engine.end();
            }, 1000);
        },

        end: () => {
            clearInterval(state.timerInt);
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-result').classList.remove('hidden');
            
            const total = state.currentSet.length;
            const accuracy = Math.round((state.score / total) * 100);
            
            const normalizedScore = (state.score / total) * 50;
            
            document.getElementById('res-score').innerText = `${state.score}/${total}`;
            document.getElementById('res-name-display').innerText = state.user;
            document.getElementById('res-accuracy').innerText = `Accuracy Percentage: ${accuracy}%`;

            let advice = "";
            if(normalizedScore <= 25) {
                advice = `You need to work much harder in your preparation, ${state.firstName}. Consistency is the bridge between goals and accomplishment.`;
            } else if (normalizedScore > 25 && normalizedScore <= 35) {
                advice = `That is a good score, ${state.firstName}, but aim for more to secure your position in the top ranks!`;
            } else {
                advice = `Excellent work, ${state.firstName}! Your technical grasp is superb. Maintain this momentum for the final exams.`;
            }
            
            document.getElementById('res-advice').innerText = advice;
        }
    };
</script>
