 * --- UPDATED AUDIO HELPER SYSTEM ---
 * Uses Free Google Audio API + Browser Synthesis fallback
 */
const AudioHelper = {
    ctx: null,
    init: function() {
        if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if(this.ctx.state === 'suspended') this.ctx.resume();
        
        // Mobile warm-up
        if ('speechSynthesis' in window) {
            let warmupMsg = new SpeechSynthesisUtterance('');
            warmupMsg.volume = 0; 
            window.speechSynthesis.speak(warmupMsg);
        }
    },
    playTing: function() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'sine'; 
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1500, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
    },
    playFush: function() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    },
    speak: function(text) {
        // Free Google Translate TTS API (Human Sounding)
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=${encodeURIComponent(text)}`;
        const audio = new Audio(url);
        audio.play().catch(() => {
            // Fallback to robotic browser voice if blocked
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        });
    }
};

// --- 10 + 10 DYNAMIC COMPLIMENTS ---
const PRAISE = {
    good: [
        "Awesome, {name}!", "Wow {name}, you are a Genius!", "Fantastic job, {name}!", 
        "Excellent work, {name}!", "You nailed it, {name}!", "Brilliant answer, {name}!", 
        "You are on fire, {name}!", "Perfect, {name}!", "Spot on, {name}!", "Great job, {name}!"
    ],
    bad: [
        "Don't give up, {name}!", "You can do this, {name}!", "Nice try {name}, keep going!", 
        "Learn from this, {name}!", "Almost there, {name}!", "Keep pushing, {name}!", 
        "Stay focused, {name}!", "You will get the next one, {name}!", "Mistakes help you grow, {name}!", 
        "Shake it off {name}, try again!"
    ]
};

const App = {
    state: { user: null, quiz: [], curr: 0, score: 0, mistakes: [], timer: null, submitted: false },

    save: (k, v) => { try { localStorage.setItem(k, v) } catch(e) {} },
    load: (k) => { try { return localStorage.getItem(k) } catch(e) { return null } },

    verifyAndLogin: () => {
        const n = document.getElementById('inp-name').value.trim();
        const q = document.getElementById('inp-qual').value;
        const c = document.getElementById('inp-code').value.trim();
        const msg = document.getElementById('auth-msg');
        const btn = document.getElementById('btn-verify');

        if(!n || !c) {
            msg.innerText = "New Month Subscription started";
            msg.style.display = 'block'; return;
        }

        AudioHelper.init(); // Warm up audio

        btn.disabled = true; btn.innerText = "Verifying..."; msg.style.display = 'none';

        fetch(`${CFG.authScript}?code=${c}&name=${n}&qual=${q}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                document.getElementById('inp-pass').value = data.password;
                App.state.user = { name: n, qual: q, code: c };
                App.save(KEYS.user, JSON.stringify(App.state.user));
                setTimeout(() => App.dash(), 800);
            } else {
                btn.disabled = false; btn.innerText = "Verify & Login";
                msg.style.display = 'block'; msg.style.color = "#FF3366";
                msg.innerHTML = data.message.includes("used") ? "Code already used or expired." : "Invalid Code";
            }
        })
        .catch(() => {
            btn.disabled = false; btn.innerText = "Verify & Login";
            msg.style.display = 'block'; msg.innerText = "Connection Error";
        });
    },

    dash: () => {
        document.getElementById('title-display').innerText = CFG.topic;
        document.getElementById('dash-topic-display').innerText = CFG.topic;
        const stored = App.load(KEYS.user);
        if(!stored) return;
        App.state.user = JSON.parse(stored);
        document.getElementById('greet-msg').innerText = `Namaste, ${App.state.user.name.split(' ')[0]}!`;
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-result').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        
        if(App.load(KEYS.sent)) {
            document.getElementById('btn-start').innerText = "Retake (Practice Mode)";
            document.getElementById('submitted-msg').style.display = 'block';
            document.getElementById('submitted-msg').innerText = "✅ Previous Score Submitted";
        } else {
            document.getElementById('btn-start').innerText = "Start Exam";
            document.getElementById('submitted-msg').style.display = 'none';
        }
        const m = JSON.parse(App.load(KEYS.mistakes) || "[]");
        document.getElementById('btn-review').style.display = m.length > 0 ? 'inline-block' : 'none';
    },

    start: (review) => {
        AudioHelper.init(); // Warm up audio
        App.state.curr = 0; App.state.score = 0; App.state.mistakes = []; App.state.submitted = false;
        const prevM = JSON.parse(App.load(KEYS.mistakes) || "[]");
        const flatDB = DB.flat ? DB.flat() : DB;
        let source = review ? flatDB.filter(q => prevM.includes(q.id)) : [...flatDB];
        if(!source.length) return alert("No questions available.");

        App.state.quiz = source.map(q => {
            let opts = q.o.map((txt, i) => ({ t: txt, c: i === q.a }));
            return { ...q, shuffledOpts: opts.sort(() => Math.random() - 0.5) };
        }).sort(() => Math.random() - 0.5);

        document.getElementById('view-dash').classList.add('hidden');
        document.getElementById('view-quiz').classList.remove('hidden');
        document.getElementById('q-total').innerText = App.state.quiz.length;
        App.timer(45*60);
        App.render();
    },

    render: () => {
        const q = App.state.quiz[App.state.curr];
        document.getElementById('q-idx').innerText = App.state.curr + 1;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('btn-next').classList.add('hidden');
        const list = document.getElementById('opts-list');
        list.innerHTML = '';
        q.shuffledOpts.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="option-marker">${String.fromCharCode(65+i)}</div>${opt.t}`;
            btn.onclick = () => App.check(btn, opt, q);
            list.appendChild(btn);
        });
    },

    check: (btn, opt, q) => {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => { b.onclick = null; b.style.opacity = '0.6'; });
        btn.style.opacity = '1';
        const praise = document.getElementById('praise-txt');
        praise.classList.remove('animate-praise');
        void praise.offsetWidth; praise.classList.add('animate-praise');
        const userName = App.state.user ? App.state.user.name.split(' ')[0] : 'Student';

        if(opt.c) {
            btn.classList.add('correct');
            App.state.score++;
            let rawTxt = PRAISE.good[Math.floor(Math.random()*PRAISE.good.length)];
            let finalTxt = rawTxt.replace('{name}', userName);
            praise.innerText = finalTxt;
            praise.style.color = "#00FF88";
            AudioHelper.playTing();
            AudioHelper.speak(finalTxt);
            let m = JSON.parse(App.load(KEYS.mistakes) || "[]").filter(id => id !== q.id);
            App.save(KEYS.mistakes, JSON.stringify(m));
        } else {
            btn.classList.add('wrong');
            all.forEach((b, i) => { if(q.shuffledOpts[i].c) b.classList.add('correct'); });
            App.state.mistakes.push(q.id);
            let rawTxt = PRAISE.bad[Math.floor(Math.random()*PRAISE.bad.length)];
            let finalTxt = rawTxt.replace('{name}', userName);
            praise.innerText = finalTxt;
            praise.style.color = "#FF3366";
            AudioHelper.playFush();
            AudioHelper.speak(finalTxt);
        }

        if(q.e) {
            document.getElementById('exp-box').innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            document.getElementById('exp-box').style.display = 'block';
        }
        document.getElementById('btn-next').classList.remove('hidden');
    },

    next: () => {
        App.state.curr++;
        if(App.state.curr < App.state.quiz.length) App.render();
        else App.finish();
    },

    timer: (sec) => {
        if(App.state.timer) clearInterval(App.state.timer);
        App.state.timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(sec<=0) App.finish();
        }, 1000);
    },

    finish: () => {
        clearInterval(App.state.timer);
        document.getElementById('view-quiz').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
        let m = JSON.parse(App.load(KEYS.mistakes) || "[]");
        m = [...new Set([...m, ...App.state.mistakes])];
        App.save(KEYS.mistakes, JSON.stringify(m));
        const pct = Math.round((App.state.score / App.state.quiz.length) * 100);
        document.getElementById('res-score').innerText = App.state.score;
        document.getElementById('res-pct').innerText = `${pct}% Accuracy`;
        App.sync();
    },

    sync: () => {
        if(App.state.submitted || App.load(KEYS.sent)) return;
        App.state.submitted = true;
        const formData = new FormData();
        formData.append("name", App.state.user.name);
        formData.append("qualification", App.state.user.qual);
        formData.append("examTitle", CFG.topic);
        formData.append("score", App.state.score);
        if(navigator.onLine) {
            fetch(CFG.scoreScript, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => {
                App.save(KEYS.sent, "true");
                document.getElementById('sync-status').innerText = "✅ Score Saved!";
                document.getElementById('sync-status').style.color = "#00FF88";
            }).catch(() => App.offline(formData));
        } else App.offline(formData);
    },

    offline: (d) => {
        let p = JSON.parse(App.load(KEYS.pending) || "[]");
        p.push(Object.fromEntries(d));
        App.save(KEYS.pending, JSON.stringify(p));
        document.getElementById('sync-status').innerText = "Saved offline.";
    }
};

window.onload = () => { if(App.load(KEYS.user)) App.dash(); };
</script>
