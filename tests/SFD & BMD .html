<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Analysis Pro | Exact SFD & BMD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Realistic Exam Copy Style */
        .exam-sheet {
            background-color: #ffffff;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 100% 2.2rem;
            line-height: 2.2rem;
            padding: 1.5rem 2rem 2.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            color: #1e293b;
            font-size: 1.05rem;
        }

        .exam-sheet::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 4.5rem; width: 2px; background-color: #ef4444; opacity: 0.4; z-index: 0;
        }
        .content-wrapper { position: relative; z-index: 10; padding-left: 3.5rem; }

        /* Custom Toggle */
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }

        /* Math Typography */
        .katex-display { margin: 0.2rem 0 !important; text-align: left !important; }
        .step-title { font-weight: 700; text-decoration: underline; margin-top: 1.5rem; color: #0f172a; line-height: 1.5; }
        .theory-note { color: #64748b; font-style: italic; font-size: 0.95rem; line-height: 1.6; margin-top: 0.5rem; display: flex; gap: 0.5rem; }
        
        /* SVG Animation & Styles */
        .draw-path { stroke-dasharray: 3000; stroke-dashoffset: 3000; animation: draw 1.5s ease-out forwards; }
        .fade-in { opacity: 0; animation: fade 1s ease-out 1s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes fade { to { opacity: 1; } }

        /* The magic wrapper for putting math inside SVG */
        .svg-math-container {
            display: flex; justify-content: center; align-items: center; 
            width: 100%; height: 100%; overflow: visible;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="ruler" class="w-6 h-6 text-emerald-400"></i>
                <h1 class="text-xl font-bold tracking-wide">Structural Analyst <span class="text-emerald-400 font-normal">| World Class Edition</span></h1>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 mt-4">
        
        <div id="input-section" class="bg-white rounded-xl shadow-md border border-slate-200 p-6 mb-6 transition-all">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b pb-4 border-slate-100">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="sliders" class="w-6 h-6 text-blue-600"></i> SF & BM Diagrams
                </h2>
                
                <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 shadow-sm cursor-pointer hover:bg-slate-100 transition-colors" onclick="document.getElementById('mode-toggle').click()">
                    <span class="text-sm font-bold text-slate-700">Theoretical Derivation (Assume W, L)</span>
                    <div class="relative inline-block w-12 align-middle select-none">
                        <input type="checkbox" id="mode-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-300 appearance-none cursor-pointer transition-all duration-300 z-10 top-0 left-0" checked/>
                        <label for="mode-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Support Condition</label>
                    <select id="beam-type" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                        <option value="ss">Simply Supported</option>
                        <option value="cantilever">Cantilever (Fixed at Left)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Load Type</label>
                    <select id="load-type" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-medium text-red-700">
                        <option value="point">Point Load (P)</option>
                        <option value="udl">Uniformly Distributed Load (UDL)</option>
                        <option value="uvl">Uniformly Varying Load (UVL)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Total Length <span id="lbl-len" class="text-blue-600">(m)</span></label>
                    <input type="number" id="beam-len" value="6" min="1" step="0.5" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Load Magnitude <span id="lbl-mag" class="text-red-600">(kN)</span></label>
                    <input type="number" id="load-mag" value="10" min="0.1" class="w-full p-3 bg-red-50 border border-red-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-red-900 font-bold">
                </div>
            </div>
            
            <div id="pos-container" class="mt-6 pt-6 border-t border-slate-100 hidden">
                <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <i data-lucide="crosshair" class="w-5 h-5 text-red-500"></i> Point Load Distance from Left Support A (a)
                </label>
                <select id="load-pos" class="w-full md:w-1/3 p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-medium shadow-sm"></select>
            </div>

            <button onclick="solveNumerical()" class="mt-8 w-full bg-slate-900 hover:bg-emerald-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                <i data-lucide="pen-tool" class="w-6 h-6"></i> Calculate & Draw Diagrams
            </button>
        </div>

        <div id="output-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-6 relative overflow-hidden">
                <button onclick="resetApp()" class="mb-4 flex items-center gap-2 text-slate-700 hover:text-blue-600 font-bold bg-white px-5 py-2.5 rounded-lg shadow-sm border border-slate-200 transition-colors w-max">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Edit Inputs
                </button>
                <div class="exam-sheet relative">
                    <div class="content-wrapper" id="math-content">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-6 bg-white rounded-xl shadow-lg border border-slate-200 sticky top-24 overflow-hidden">
                <div class="bg-slate-50 border-b border-slate-200 p-4 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                        <i data-lucide="bar-chart-2" class="w-5 h-5 text-emerald-600"></i> Free Body Diagram, SFD & BMD
                    </h3>
                </div>
                <div class="p-6 w-full flex justify-center overflow-x-auto bg-white">
                    <svg id="svg-canvas" viewBox="0 0 700 950" class="w-full max-w-[700px] h-auto"></svg>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        const elType = document.getElementById('beam-type');
        const elLoad = document.getElementById('load-type');
        const elLen = document.getElementById('beam-len');
        const elMag = document.getElementById('load-mag');
        const elMode = document.getElementById('mode-toggle');
        const elPos = document.getElementById('load-pos');
        const posCont = document.getElementById('pos-container');

        // Dynamically update UI and dropdown options based on Physical Length
        function updateUI() {
            const isSym = elMode.checked;
            const isPoint = elLoad.value === 'point';
            const L = parseFloat(elLen.value) || 6;
            
            elLen.disabled = isSym;
            elMag.disabled = isSym;
            
            document.getElementById('lbl-len').innerText = isSym ? "(Assumed L)" : "(m)";
            document.getElementById('lbl-mag').innerText = isSym ? (isPoint ? "(Assumed P)" : "(Assumed W)") : (isPoint ? "(kN)" : "(kN/m)");

            if (isPoint) {
                posCont.classList.remove('hidden');
                elPos.innerHTML = '';
                // The mathematical center is always exact
                elPos.innerHTML = `<option value="${L/2}">Exactly at Center (${L/2}m)</option>`;
                
                if (!isSym) {
                    // Populate other integer distances
                    for(let i=1; i<L; i++) {
                        if (i !== L/2) elPos.innerHTML += `<option value="${i}">Eccentric at ${i}m</option>`;
                    }
                }
            } else {
                posCont.classList.add('hidden');
            }
        }

        elLen.addEventListener('input', updateUI);
        elType.addEventListener('change', updateUI);
        elLoad.addEventListener('change', updateUI);
        elMode.addEventListener('change', updateUI);
        updateUI(); // Init

        // Core Engineering Math Engine
        function solveNumerical() {
            const isSym = elMode.checked;
            const beam = elType.value;
            const load = elLoad.value;
            
            // True geometric values for drawing proportions perfectly
            const L = parseFloat(elLen.value) || 6;
            const Mag = parseFloat(elMag.value) || 10;
            const a = elLoad.value === 'point' ? (parseFloat(elPos.value) || (L/2)) : L/2;
            const b = L - a;
            
            // Symbolic strings for KaTeX Text output
            const strL = isSym ? `L` : `${L}`;
            const strP = isSym ? `P` : `${Mag}`;
            const strW = isSym ? `W` : `${Mag}`;

            let html = "";
            const addTitle = (t) => { html += `<div class="step-title">${t}</div>`; };
            const addMath = (t) => { html += `<div>${katex.renderToString(`\\displaystyle ${t}`, {throwOnError: false})}</div>`; };
            const addNote = (t) => { html += `<div class="theory-note"><i data-lucide="info" class="w-4 h-4 mt-1"></i><span>${t}</span></div>`; };

            // Bundle exact data to pass to SVG drawing engine
            let graphData = { beam, load, isSym, L, Mag, a, b, labels: {} };

            if (beam === 'ss') {
                if (load === 'point') {
                    const isCenter = (a === L/2);
                    const strA = isSym ? (isCenter ? `\\frac{L}{2}` : `a`) : `${a}`;
                    const strB = isSym ? (isCenter ? `\\frac{L}{2}` : `b`) : `${b}`;
                    
                    // Generate Exact Labels for Math & SVG
                    const Ra_sym = isSym ? (isCenter ? `\\frac{P}{2}` : `\\frac{Pb}{L}`) : `${(Mag*b/L).toFixed(2)}`;
                    const Rb_sym = isSym ? (isCenter ? `\\frac{P}{2}` : `\\frac{Pa}{L}`) : `${(Mag*a/L).toFixed(2)}`;
                    const M_sym = isSym ? (isCenter ? `\\frac{PL}{4}` : `\\frac{Pab}{L}`) : `${(Mag*a*b/L).toFixed(2)}`;

                    graphData.labels = { Ra: Ra_sym, Rb: Rb_sym, SFA: Ra_sym, SFB: Rb_sym, Mmax: M_sym, Load: strP, distA: strA, distB: strB };

                    addTitle("Step 1: Calculate the Reactions");
                    addMath(`+\\uparrow \\Sigma F_y = 0 \\implies R_{Ay} + R_{By} = ${strP} \\quad \\text{--- (i)}`);
                    addMath(`\\circlearrowright+ \\Sigma M_A = 0`);
                    addMath(`${strP} \\times ${strA} - R_{By} \\times ${strL} = 0`);
                    if(isSym && isCenter) {
                        addMath(`\\frac{PL}{2} = R_{By} \\cdot L \\implies \\mathbf{R_{By} = ${Rb_sym}}`);
                    } else {
                        addMath(`R_{By} = \\frac{${strP} \\times ${strA}}{${strL}} \\implies \\mathbf{R_{By} = ${Rb_sym}}`);
                    }
                    addMath(`\\text{From (i): } R_{Ay} = ${strP} - ${Rb_sym} \\implies \\mathbf{R_{Ay} = ${Ra_sym}}`);

                    addTitle("Step 2: Calculation of S.F and S.F.D");
                    addMath(`\\text{At point A: } (V_A)_{\\text{right}} = R_{Ay} = \\mathbf{${Ra_sym}}`);
                    addMath(`\\text{At load point C:}`);
                    addMath(`(V_C)_{\\text{left}} = ${Ra_sym}`);
                    addMath(`(V_C)_{\\text{right}} = ${Ra_sym} - ${strP} = \\mathbf{-${Rb_sym}}`);
                    addMath(`\\text{At point B: } (V_B)_{\\text{left}} = \\mathbf{-${Rb_sym}}`);
                    addNote("The S.F.D consists of rectangles. Shear changes sign at the point load.");

                    addTitle("Step 3: Calculation of B.M and B.M.D");
                    addMath(`\\text{Supports: } M_A = 0, \\quad M_B = 0`);
                    addMath(`\\text{Max BM at C: } \\circlearrowleft+ \\Sigma M_C = R_{Ay} \\times ${strA}`);
                    addMath(`M_C = ${Ra_sym} \\times ${strA} = \\mathbf{${M_sym}}`);
                    addNote("The B.M.D is triangular. BM is maximum where S.F changes sign.");

                } else if (load === 'udl') {
                    const R_val = isSym ? `\\frac{WL}{2}` : `${(Mag*L/2).toFixed(2)}`;
                    const M_val = isSym ? `\\frac{WL^2}{8}` : `${(Mag*L*L/8).toFixed(2)}`;
                    const Tot = isSym ? `WL` : `${(Mag*L).toFixed(2)}`;

                    graphData.labels = { Ra: R_val, Rb: R_val, SFA: R_val, SFB: R_val, Mmax: M_val, Load: `${strW} ${isSym?'':'kN/m'}`, distA: isSym?`L/2`:`${L/2}` };

                    addTitle("Step 1: Calculate the Reactions");
                    addMath(`\\text{Total Equivalent Load } = ${strW} \\times ${strL} = ${Tot}`);
                    addMath(`+\\uparrow \\Sigma F_y = 0 \\implies R_{Ay} + R_{By} = ${Tot} \\quad \\text{--- (i)}`);
                    addMath(`\\circlearrowright+ \\Sigma M_A = 0`);
                    addMath(`(${Tot}) \\times \\frac{${strL}}{2} - R_{By} \\times ${strL} = 0 \\implies \\mathbf{R_{By} = ${R_val}}`);
                    addMath(`\\text{From (i): } R_{Ay} = ${Tot} - ${R_val} \\implies \\mathbf{R_{Ay} = ${R_val}}`);

                    addTitle("Step 2: Calculation of S.F and S.F.D");
                    addMath(`(SF_A)_R = \\mathbf{${R_val}}`);
                    addMath(`(SF_C) = ${R_val} - ${strW} \\times \\frac{${strL}}{2} = \\mathbf{0} \\quad \\text{(At center)}`);
                    addMath(`(SF_B)_L = \\mathbf{-${R_val}}`);
                    addNote("S.F.D is bounded by inclined straight lines forming triangles.");

                    addTitle("Step 3: Calculation of B.M and B.M.D");
                    addMath(`M_A = 0, \\quad M_B = 0`);
                    addMath(`M_C = R_{Ay} \\times \\frac{${strL}}{2} - (${strW} \\times \\frac{${strL}}{2}) \\times \\frac{${strL}}{4}`);
                    if(isSym) addMath(`M_C = \\frac{WL^2}{4} - \\frac{WL^2}{8} = \\mathbf{${M_val}}`);
                    else addMath(`M_C = \\mathbf{${M_val}}`);
                    addNote("B.M.D is a smooth parabolic curve (2nd degree).");
                
                } else if (load === 'uvl') {
                    // UVL max at B (Standard textbook derivation setup)
                    const Tot = isSym ? `\\frac{WL}{2}` : `${(0.5*Mag*L).toFixed(2)}`;
                    const Ra_val = isSym ? `\\frac{WL}{6}` : `${(0.5*Mag*L/3).toFixed(2)}`;
                    const Rb_val = isSym ? `\\frac{WL}{3}` : `${(0.5*Mag*L*2/3).toFixed(2)}`;
                    const x_val = isSym ? `\\frac{L}{\\sqrt{3}}` : `${(L/Math.sqrt(3)).toFixed(2)}`;
                    const M_val = isSym ? `\\frac{WL^2}{9\\sqrt{3}}` : `${(Mag*L*L/(9*Math.sqrt(3))).toFixed(2)}`;

                    graphData.labels = { Ra: Ra_val, Rb: Rb_val, SFA: Ra_val, SFB: Rb_val, Mmax: M_val, Load: `${strW} ${isSym?'':'kN/m'}` };

                    addTitle("Step 1: Calculate the Reactions");
                    addMath(`\\text{Total Load } = \\frac{1}{2} \\times ${strL} \\times ${strW} = ${Tot}`);
                    addMath(`+\\uparrow \\Sigma F_y = 0 \\implies R_{Ay} + R_{By} = ${Tot}`);
                    addMath(`\\circlearrowright+ \\Sigma M_A = 0`);
                    addMath(`(${Tot}) \\times \\frac{2${strL}}{3} - R_{By} \\times ${strL} = 0 \\implies \\mathbf{R_{By} = ${Rb_val}}`);
                    addMath(`R_{Ay} = ${Tot} - ${Rb_val} \\implies \\mathbf{R_{Ay} = ${Ra_val}}`);

                    addTitle("Step 2: Calculation of S.F and S.F.D");
                    addMath(`V_x = R_{Ay} - \\frac{1}{2}(\\frac{${strW}}{${strL}}x)x = ${Ra_val} - \\frac{${strW} x^2}{2${strL}}`);
                    addMath(`V_A = \\mathbf{${Ra_val}}, \\quad V_B = \\mathbf{-${Rb_val}}`);
                    addMath(`\\text{Set } V_x = 0 \\implies \\mathbf{x = ${x_val}}`);
                    addNote("S.F.D is a parabolic curve (2nd degree).");

                    addTitle("Step 3: Calculation of B.M and B.M.D");
                    addMath(`M_A = 0, \\quad M_B = 0`);
                    addMath(`M_{max} \\text{ at } x = ${x_val} \\implies \\mathbf{M_{max} = ${M_val}}`);
                    addNote("B.M.D is a cubic curve (3rd degree).");
                }
            } else { // CANTILEVER (Fixed at A)
                
                // For UVL on Cantilever, standard is max load at fixed end A, 0 at free end B
                const isUVL = load === 'uvl';
                
                const Ra_val = isSym ? (load==='point'?`P`:load==='udl'?`WL`:`\\frac{WL}{2}`) : (load==='point'?Mag:load==='udl'?Mag*L:0.5*Mag*L).toFixed(2);
                const Ma_val = isSym ? (load==='point'?(a===L?`PL`:`Pa`):load==='udl'?`\\frac{WL^2}{2}`:`\\frac{WL^2}{6}`) : (load==='point'?Mag*a:load==='udl'?Mag*L*L/2:0.5*Mag*L*L/3).toFixed(2);
                
                graphData.labels = { Ra: Ra_val, Rb: '', SFA: Ra_val, SFB: '0', Mmax: Ma_val, Load: isSym?(load==='point'?'P':'W'):Mag, distA: isSym?(a===L?'L':'a'):a };

                addTitle("Step 1: Calculate the Reactions (Fixed Support A)");
                addMath(`+\\uparrow \\Sigma F_y = 0 \\implies R_{Ay} = \\text{Total Load} \\implies \\mathbf{R_{Ay} = ${Ra_val}}`);
                addMath(`\\circlearrowright+ \\Sigma M_A = 0 \\implies M_A = \\text{Total Moment}`);
                addMath(`\\mathbf{M_A = ${Ma_val}} \\text{ (Hogging Moment)}`);

                addTitle("Step 2: S.F.D");
                addMath(`(SF_A)_R = \\mathbf{${Ra_val}}, \\quad (SF_B)_L = \\mathbf{0}`);
                addNote(load==='point' ? "S.F.D is a rectangle." : (load==='udl' ? "S.F.D is a triangle." : "S.F.D is parabolic."));

                addTitle("Step 3: B.M.D");
                addMath(`M_A = \\mathbf{-${Ma_val}}, \\quad M_B = \\mathbf{0}`);
                addNote("Negative bending moment denotes Hogging (tension at top fibers).");
            }

            document.getElementById('math-content').innerHTML = html;
            
            // Execute Vector Graphics Engine
            lucide.createIcons();
            drawEngine(graphData);

            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('output-section').classList.remove('hidden');
        }

        // World Class SVG Drawing Engine with Embedded Math
        function drawEngine(data) {
            const svg = document.getElementById('svg-canvas');
            const w = 700, hFBD = 200, hSFD = 480, hBMD = 780;
            const mX = 90, drawW = w - 2*mX;
            
            // The golden rule: SVG X coordinates are directly scaled from True Physical Length
            const scX = x => mX + (x / data.L) * drawW; 
            
            // Function to embed KaTeX flawlessly inside SVG coordinates
            const mathObj = (x, y, tex, width=160, height=60) => {
                const htmlStr = katex.renderToString(`\\displaystyle ${tex}`, {throwOnError: false});
                return `<foreignObject x="${x - width/2}" y="${y - height/2}" width="${width}" height="${height}">
                            <div class="svg-math-container" xmlns="http://www.w3.org/1999/xhtml">
                                <span style="font-size: 1.1rem; color: #0f172a;">${htmlStr}</span>
                            </div>
                        </foreignObject>`;
            };

            let c = `
                <defs>
                    <pattern id="sfd-hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                        <line x1="0" y1="0" x2="0" y2="8" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
                    </pattern>
                    <pattern id="bmd-hatch" width="8" height="8" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
                        <line x1="0" y1="0" x2="0" y2="8" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
                    </pattern>
                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                    </marker>
                    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
                    </marker>
                </defs>
            `;

            // --- Reference Guidelines ---
            c += `<line x1="${scX(0)}" y1="120" x2="${scX(0)}" y2="880" stroke="#cbd5e1" stroke-dasharray="6,4" stroke-width="1.5" />`;
            c += `<line x1="${scX(data.L)}" y1="120" x2="${scX(data.L)}" y2="880" stroke="#cbd5e1" stroke-dasharray="6,4" stroke-width="1.5"/>`;
            
            let loadPx = data.load === 'point' ? scX(data.a) : scX(data.L/2);
            if(data.beam === 'ss' && data.load !== 'uvl') {
                c += `<line x1="${loadPx}" y1="120" x2="${loadPx}" y2="880" stroke="#e2e8f0" stroke-dasharray="4,4" stroke-width="1.5"/>`;
            }

            // ----------------------------------------------------
            // 1. FREE BODY DIAGRAM (F.B.D)
            // ----------------------------------------------------
            c += `<text x="${mX}" y="70" font-weight="bold" font-size="16" fill="#0f172a" text-decoration="underline">Free Body Diagram</text>`;
            
            // Beam
            c += `<line x1="${scX(0)}" y1="${hFBD}" x2="${scX(data.L)}" y2="${hFBD}" stroke="#334155" stroke-width="4" stroke-linecap="round" />`;
            c += `<text x="${scX(0)-20}" y="${hFBD-10}" font-weight="bold" font-size="16" fill="#334155">A</text>`;
            c += `<text x="${scX(data.L)+20}" y="${hFBD-10}" font-weight="bold" font-size="16" fill="#334155">B</text>`;

            if (data.beam === 'ss') {
                // Supports
                c += `<polygon points="${scX(0)},${hFBD+3} ${scX(0)-10},${hFBD+18} ${scX(0)+10},${hFBD+18}" fill="#94a3b8" stroke="#334155" stroke-width="2"/>`;
                c += `<circle cx="${scX(data.L)}" cy="${hFBD+10}" r="7" fill="#94a3b8" stroke="#334155" stroke-width="2"/>`;
                // Reaction Arrows (Blue)
                c += `<line x1="${scX(0)}" y1="${hFBD+75}" x2="${scX(0)}" y2="${hFBD+25}" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>`;
                c += mathObj(scX(0), hFBD+95, `R_A = ${data.labels.Ra}`);
                c += `<line x1="${scX(data.L)}" y1="${hFBD+75}" x2="${scX(data.L)}" y2="${hFBD+25}" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>`;
                c += mathObj(scX(data.L), hFBD+95, `R_B = ${data.labels.Rb}`);
            } else {
                // Cantilever Fixed Left
                c += `<rect x="${scX(0)-12}" y="${hFBD-35}" width="12" height="70" fill="#94a3b8" stroke="#334155" stroke-width="2" />`;
                for(let i=0; i<7; i++) c += `<line x1="${scX(0)-12}" y1="${hFBD-35 + i*10}" x2="${scX(0)-25}" y2="${hFBD-25 + i*10}" stroke="#475569" stroke-width="1.5"/>`;
                c += `<line x1="${scX(0)}" y1="${hFBD+75}" x2="${scX(0)}" y2="${hFBD+40}" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>`;
                c += mathObj(scX(0), hFBD+95, `R_A = ${data.labels.Ra}`);
                c += mathObj(scX(0)-40, hFBD-50, `M_A`); // Bending moment curved arrow omitted for SVG simplicity, label suffices.
            }

            // Draw Loads (Red)
            if (data.load === 'point') {
                c += `<line x1="${loadPx}" y1="${hFBD-75}" x2="${loadPx}" y2="${hFBD-5}" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow)"/>`;
                c += mathObj(loadPx, hFBD-95, data.labels.Load);
                if(data.beam==='ss' || data.a < data.L) {
                    c += `<text x="${loadPx}" y="${hFBD+25}" font-weight="bold" fill="#334155">C</text>`;
                    c += `<line x1="${scX(0)}" y1="${hFBD-40}" x2="${loadPx}" y2="${hFBD-40}" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>`;
                    c += mathObj(scX(data.a/2), hFBD-55, data.labels.distA);
                }
            } else if (data.load === 'udl') {
                for(let i=0; i<=10; i++) c += `<line x1="${scX(i*data.L/10)}" y1="${hFBD-40}" x2="${scX(i*data.L/10)}" y2="${hFBD-5}" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>`;
                c += `<line x1="${scX(0)}" y1="${hFBD-40}" x2="${scX(data.L)}" y2="${hFBD-40}" stroke="#ef4444" stroke-width="2"/>`;
                c += mathObj(scX(data.L/2), hFBD-65, data.labels.Load);
            } else if (data.load === 'uvl') {
                let pts = `${scX(0)},${hFBD} `;
                if(data.beam === 'ss') {
                    // Max at right
                    for(let i=0; i<=10; i++) {
                        let px = scX(i*data.L/10); let ht = 60*(i/10);
                        if(ht>5) c += `<line x1="${px}" y1="${hFBD-ht}" x2="${px}" y2="${hFBD-5}" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>`;
                        pts += `${px},${hFBD-ht} `;
                    }
                    c += mathObj(scX(data.L*0.85), hFBD-75, data.labels.Load);
                } else {
                    // Cantilever UVL (Max at Fixed Left A, 0 at B)
                    for(let i=0; i<=10; i++) {
                        let px = scX(i*data.L/10); let ht = 60*(1 - i/10);
                        if(ht>5) c += `<line x1="${px}" y1="${hFBD-ht}" x2="${px}" y2="${hFBD-5}" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>`;
                        pts += `${px},${hFBD-ht} `;
                    }
                    c += mathObj(scX(data.L*0.15), hFBD-75, data.labels.Load);
                }
                c += `<polyline points="${pts}" fill="none" stroke="#ef4444" stroke-width="2"/>`;
            }

            // ----------------------------------------------------
            // 2. SHEAR FORCE DIAGRAM (S.F.D)
            // ----------------------------------------------------
            c += `<text x="${mX}" y="${hSFD - 100}" font-weight="bold" font-size="16" fill="#0f172a" text-decoration="underline">Shear Force Diagram</text>`;
            c += `<line x1="${mX-30}" y1="${hSFD}" x2="${w-mX+30}" y2="${hSFD}" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>`; // Baseline
            
            let sPath = `${scX(0)},${hSFD} `;
            const sfH = 65; // Visual Amplitude
            
            if (data.beam === 'ss') {
                if (data.load === 'point') {
                    sPath += `${scX(0)},${hSFD-sfH} ${loadPx},${hSFD-sfH} ${loadPx},${hSFD+sfH} ${scX(data.L)},${hSFD+sfH} ${scX(data.L)},${hSFD}`;
                } else if (data.load === 'udl') {
                    sPath += `${scX(0)},${hSFD-sfH} ${scX(data.L)},${hSFD+sfH} ${scX(data.L)},${hSFD}`;
                } else if (data.load === 'uvl') {
                    sPath += `${scX(0)},${hSFD-sfH} `;
                    for(let i=1; i<=10; i++) sPath += `${scX(i*data.L/10)},${hSFD - (sfH - sfH*1.5*Math.pow(i/10,2))} `;
                    sPath += `${scX(data.L)},${hSFD}`;
                }
            } else { // Cantilever
                if (data.load === 'point') {
                    sPath += `${scX(0)},${hSFD-sfH} ${loadPx},${hSFD-sfH} ${loadPx},${hSFD} ${scX(data.L)},${hSFD}`;
                } else if (data.load === 'udl') {
                    sPath += `${scX(0)},${hSFD-sfH} ${scX(data.L)},${hSFD}`;
                } else if (data.load === 'uvl') { // Max at Left
                    for(let i=0; i<=10; i++) sPath += `${scX(i*data.L/10)},${hSFD - sfH*Math.pow(1-i/10,2)} `;
                    sPath += `${scX(data.L)},${hSFD}`;
                }
            }

            // Draw S.F.D Shapes
            c += `<polygon points="${sPath}" fill="url(#sfd-hatch)" class="fade-in"/>`;
            c += `<polyline points="${sPath}" fill="none" stroke="#2563eb" stroke-width="2.5" class="draw-path" stroke-linejoin="round"/>`;
            
            // S.F.D KaTeX Labels
            c += mathObj(scX(0), hSFD-sfH-30, data.labels.SFA);
            if(data.beam === 'ss') {
                c += mathObj(scX(data.L), hSFD+sfH+30, `-`+data.labels.SFB);
                c += `<circle cx="${scX(data.a/2)}" cy="${hSFD-sfH/2}" r="12" fill="#fff" stroke="#2563eb" stroke-width="1.5"/><text x="${scX(data.a/2)}" y="${hSFD-sfH/2+6}" font-weight="bold" font-size="16" fill="#2563eb" text-anchor="middle">+</text>`;
                c += `<circle cx="${scX(data.L - data.b/2)}" cy="${hSFD+sfH/2}" r="12" fill="#fff" stroke="#2563eb" stroke-width="1.5"/><text x="${scX(data.L - data.b/2)}" y="${hSFD+sfH/2+4}" font-weight="bold" font-size="18" fill="#2563eb" text-anchor="middle">-</text>`;
            } else {
                c += `<circle cx="${scX(data.a/2)}" cy="${hSFD-sfH/2}" r="12" fill="#fff" stroke="#2563eb" stroke-width="1.5"/><text x="${scX(data.a/2)}" y="${hSFD-sfH/2+6}" font-weight="bold" font-size="16" fill="#2563eb" text-anchor="middle">+</text>`;
            }

            // ----------------------------------------------------
            // 3. BENDING MOMENT DIAGRAM (B.M.D)
            // ----------------------------------------------------
            c += `<text x="${mX}" y="${hBMD - 110}" font-weight="bold" font-size="16" fill="#0f172a" text-decoration="underline">Bending Moment Diagram</text>`;
            c += `<line x1="${mX-30}" y1="${hBMD}" x2="${w-mX+30}" y2="${hBMD}" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>`; // Baseline
            
            let bPath = `${scX(0)},${hBMD} `;
            const bmH = 75; // Visual Amplitude

            if (data.beam === 'ss') { 
                // Sagging (+ve) Upwards
                if (data.load === 'point') {
                    bPath += `${loadPx},${hBMD-bmH} ${scX(data.L)},${hBMD}`;
                } else if (data.load === 'udl') {
                    for(let i=0; i<=10; i++) bPath += `${scX(i*data.L/10)},${hBMD - bmH*(4*(i/10)*(1-i/10))} `;
                } else if (data.load === 'uvl') {
                    for(let i=0; i<=10; i++) bPath += `${scX(i*data.L/10)},${hBMD - bmH*1.5*((i/10)-Math.pow(i/10,3))} `;
                }
            } else { 
                // Hogging (-ve) Downwards
                if (data.load === 'point') {
                    bPath += `${scX(0)},${hBMD+bmH} ${loadPx},${hBMD} ${scX(data.L)},${hBMD}`;
                } else if (data.load === 'udl') {
                    for(let i=0; i<=10; i++) bPath += `${scX(i*data.L/10)},${hBMD + bmH*Math.pow(1-i/10,2)} `;
                } else if (data.load === 'uvl') { // Max at left
                    for(let i=0; i<=10; i++) bPath += `${scX(i*data.L/10)},${hBMD + bmH*Math.pow(1-i/10,3)} `;
                }
            }

            // Draw B.M.D Shapes
            c += `<polygon points="${bPath}" fill="url(#bmd-hatch)" class="fade-in"/>`;
            c += `<polyline points="${bPath}" fill="none" stroke="#16a34a" stroke-width="2.5" class="draw-path" stroke-linejoin="round"/>`;
            
            // B.M.D KaTeX Labels
            if(data.beam === 'ss') {
                const maxLoc = data.load==='uvl' ? scX(data.L/Math.sqrt(3)) : loadPx;
                c += mathObj(maxLoc, hBMD-bmH-35, data.labels.Mmax);
                c += `<line x1="${maxLoc}" y1="${hBMD}" x2="${maxLoc}" y2="${hBMD-bmH}" stroke="#16a34a" stroke-dasharray="4,4" stroke-width="1.5"/>`;
                c += `<circle cx="${scX(data.L/2)}" cy="${hBMD-bmH/2}" r="12" fill="#fff" stroke="#16a34a" stroke-width="1.5"/><text x="${scX(data.L/2)}" y="${hBMD-bmH/2+6}" font-weight="bold" font-size="16" fill="#16a34a" text-anchor="middle">+</text>`;
            } else {
                c += mathObj(scX(0), hBMD+bmH+40, `-`+data.labels.Mmax);
                c += `<circle cx="${scX(data.a/2)}" cy="${hBMD+bmH/2}" r="12" fill="#fff" stroke="#16a34a" stroke-width="1.5"/><text x="${scX(data.a/2)}" y="${hBMD+bmH/2+4}" font-weight="bold" font-size="18" fill="#16a34a" text-anchor="middle">-</text>`;
            }

            svg.innerHTML = c;
        }

        function resetApp() {
            document.getElementById('output-section').classList.add('hidden');
            document.getElementById('input-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
