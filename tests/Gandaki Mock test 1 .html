<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> (HARD + SMART) ² </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --secondary: #7000ff;
            --success: #00ff88;
            --error: #ff2d55;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Smooth UI Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- Input Fields --- */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .glass-input, .glass-select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .glass-select option { background: #1a1a2e; color: white; }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--accent), #00a2ff); color: #000; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }
        .btn-mistake { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn-group { background: linear-gradient(135deg, #25D366, #128C7E); color: #fff; text-decoration: none; }

        /* --- Quiz Elements --- */
        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.85rem; font-weight: bold; }
        .timer { color: var(--error); background: rgba(255, 45, 85, 0.1); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--error); }
        
        .question-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        
        .option {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            gap: 12px;
            font-weight: 500;
        }
        .option.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--success) !important; color: var(--success); }
        .option.wrong { background: rgba(255, 45, 85, 0.2) !important; border-color: var(--error) !important; color: var(--error); }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .hidden { display: none !important; }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="view-login" class="glass-card animate">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 1.8rem; color: var(--accent);"> (HARD + SMART) ² </h1>
                <p style="opacity: 0.6; font-size: 0.9rem;">Loksewa Technical Series</p>
            </div>
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="in-name" class="glass-input" placeholder="Your Name">
            </div>
            <div class="input-group">
                <label>Qualification</label>
                <select id="in-qual" class="glass-select">
                    <option value="" disabled selected>Select Qualification</option>
                    <option value="Engineer">Engineer</option>
                    <option value="Sub Engineer">Sub Engineer</option>
                    <option value="Assistant Sub Engineer">Assistant Sub Engineer</option>
                </select>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="in-pass" class="glass-input" placeholder="••••">
            </div>
            
            <button class="btn btn-primary" onclick="engine.login()">ENTER SYSTEM</button>
        </div>

        <div id="view-dash" class="glass-card animate hidden">
            <h2 id="dash-welcome">Namaste!</h2>
            <p style="opacity: 0.6; margin-bottom: 30px;">Technical Knowledge Hub</p>
            
            <button class="btn btn-primary" onclick="engine.startTest(false)">🚀 START TEST</button>
            <button class="btn btn-mistake" onclick="engine.startTest(true)">📖 REVIEW MISTAKES <span id="mistake-count">(0)</span></button>
            <a href="https://chat.whatsapp.com/GpMpVmBo71RBZqLOf1l4PM?mode=gi_t" class="btn btn-group" target="_blank">💬 JOIN STUDY GROUP</a>
        </div>

        <div id="view-quiz" class="glass-card animate hidden">
            <div class="q-header">
                <span>Q: <span id="q-idx">1</span>/<span id="q-total">0</span></span>
                <span id="timer" class="timer">45:00</span>
            </div>
            <div class="progress-bar"><div id="p-bar" class="progress-fill"></div></div>
            
            <div id="question-area">
                <p class="question-text" id="q-text">Loading...</p>
                <div id="options-area"></div>
                <div id="explanation-box" class="explanation"></div>
            </div>

            <button id="next-btn" class="btn btn-primary hidden" onclick="engine.next()">NEXT QUESTION</button>
        </div>

        <div id="view-result" class="glass-card animate hidden" style="text-align:center;">
            <h1 id="res-score" style="font-size: 3rem; color: var(--accent);">0/0</h1>
            <p style="margin-bottom: 25px;">Test Completed Successfully</p>
            <button class="btn btn-primary" onclick="location.reload()">BACK TO LOGIN</button>
        </div>

    </div>

<script>
    const CONFIG = {
        password: "2059",
        timer: 45 * 60
    };

    /** * PASTE YOUR QUESTIONS JSON HERE 
     * Format example: { "id": 1, "q": "...", "o": ["A", "B"...], "a": 1, "e": "..." }
     */
    const QUESTIONS_DATA = [
        // Your questions go here
    ];

    let state = {
        user: "",
        score: 0,
        idx: 0,
        time: CONFIG.timer,
        mistakes: JSON.parse(localStorage.getItem('mistakeBank')) || [],
        currentSet: [],
        timerInt: null
    };

    const engine = {
        login: () => {
            const user = document.getElementById('in-name').value;
            const pass = document.getElementById('in-pass').value;
            const qual = document.getElementById('in-qual').value;

            if(pass !== CONFIG.password) return alert("Incorrect Password!");
            if(!user || !qual) return alert("Please complete your profile!");
            
            state.user = user;
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dash').classList.remove('hidden');
            document.getElementById('dash-welcome').innerText = `Namaste, ${user.split(' ')[0]}!`;
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
        },

        startTest: (reviewMode) => {
            if(QUESTIONS_DATA.length === 0 && !reviewMode) return alert("Question bank is empty!");
            
            state.score = 0;
            state.idx = 0;
            state.time = CONFIG.timer;
            
            if(reviewMode) {
                if(state.mistakes.length === 0) return alert("No mistakes to review!");
                state.currentSet = QUESTIONS_DATA.filter(q => state.mistakes.includes(q.id));
            } else {
                state.currentSet = [...QUESTIONS_DATA].sort(() => 0.5 - Math.random());
            }

            document.getElementById('q-total').innerText = state.currentSet.length;
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            engine.render();
            engine.timer();
        },

        render: () => {
            const q = state.currentSet[state.idx];
            document.getElementById('q-idx').innerText = state.idx + 1;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-box').style.display = 'none';
            
            const optArea = document.getElementById('options-area');
            optArea.innerHTML = "";
            
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option animate';
                div.innerHTML = `<span>${String.fromCharCode(65+i)}.</span> ${opt}`;
                div.onclick = () => engine.check(i, div);
                optArea.appendChild(div);
            });

            document.getElementById('p-bar').style.width = `${((state.idx+1)/state.currentSet.length)*100}%`;
        },

        check: (choice, el) => {
            const q = state.currentSet[state.idx];
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.style.pointerEvents = 'none');

            if(choice === q.a) {
                el.classList.add('correct');
                state.score++;
                state.mistakes = state.mistakes.filter(id => id !== q.id);
            } else {
                el.classList.add('wrong');
                opts[q.a].classList.add('correct');
                if(!state.mistakes.includes(q.id)) state.mistakes.push(q.id);
            }
            
            if(q.e) {
                const exp = document.getElementById('explanation-box');
                exp.innerText = "💡 " + q.e;
                exp.style.display = 'block';
            }

            localStorage.setItem('mistakeBank', JSON.stringify(state.mistakes));
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
            document.getElementById('next-btn').classList.remove('hidden');
        },

        next: () => {
            state.idx++;
            if(state.idx < state.currentSet.length) engine.render();
            else engine.end();
        },

        timer: () => {
            clearInterval(state.timerInt);
            state.timerInt = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60);
                let s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(state.time <= 0) engine.end();
            }, 1000);
        },

        end: () => {
            clearInterval(state.timerInt);
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-result').classList.remove('hidden');
            document.getElementById('res-score').innerText = `${state.score}/${state.currentSet.length}`;
        }
    };
</script>
</body>
</html>
