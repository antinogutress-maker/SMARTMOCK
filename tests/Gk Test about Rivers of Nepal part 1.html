    <style>

            --accent-glow: rgba(0, 242, 255, 0.5);

            --success: #00ff88;
            --error: #ff2d55;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .glass-input, .glass-select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .glass-select option { background: #1a1a2e; color: white; }

        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--accent), #00a2ff); color: #000; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }
        .btn-mistake { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn-group { background: linear-gradient(135deg, #25D366, #128C7E); color: #fff; text-decoration: none; }

        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.85rem; font-weight: bold; }
        .timer { color: var(--error); background: rgba(255, 45, 85, 0.1); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--error); }
        
        .question-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        
        .option {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            gap: 12px;
            font-weight: 500;
        }
        .option.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--success) !important; color: var(--success); }
        .option.wrong { background: rgba(255, 45, 85, 0.2) !important; border-color: var(--error) !important; color: var(--error); }

        /* Feedback Styling */
        .feedback-text {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            display: none;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .hidden { display: none !important; }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

        /* Result Specifics */
        .res-stat { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
        .advice-box { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; line-height: 1.6; border: 1px dashed var(--glass-border); }
    </style>
</head>

            state.firstName = user.split(' ')[0]; // Extract first name
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dash').classList.remove('hidden');
            document.getElementById('dash-welcome').innerText = `Namaste, ${state.firstName}!`;
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
        },

        startTest: (reviewMode) => {
            if(QUESTIONS_DATA.length === 0 && !reviewMode) return alert("Question bank is empty!");
            
            state.score = 0;
            state.idx = 0;
            state.time = CONFIG.timer;
            
            if(reviewMode) {
                if(state.mistakes.length === 0) return alert("No mistakes to review!");
                state.currentSet = QUESTIONS_DATA.filter(q => state.mistakes.includes(q.id));
            } else {
                state.currentSet = [...QUESTIONS_DATA].sort(() => 0.5 - Math.random());
            }

            document.getElementById('q-total').innerText = state.currentSet.length;
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            engine.render();
            engine.timer();
        },

        render: () => {
            const q = state.currentSet[state.idx];
            document.getElementById('q-idx').innerText = state.idx + 1;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('feedback-msg').style.display = 'none';
            
            const optArea = document.getElementById('options-area');
            optArea.innerHTML = "";
            
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option animate';
                div.innerHTML = `<span>${String.fromCharCode(65+i)}.</span> ${opt}`;
                div.onclick = () => engine.check(i, div);
                optArea.appendChild(div);
            });

            document.getElementById('p-bar').style.width = `${((state.idx+1)/state.currentSet.length)*100}%`;
        },

        check: (choice, el) => {
            const q = state.currentSet[state.idx];
            const opts = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback-msg');
            opts.forEach(o => o.style.pointerEvents = 'none');

            const compliments = ["Amazing", "Wow", "Fantastic", "Well Done", "Lovely", "Superb", "Brilliant"];
            const motivation = ["Don't give up", "Keep trying", "You've got this", "Stay focused", "Almost there", "Keep going"];

            feedback.style.display = 'block';

            if(choice === q.a) {
                el.classList.add('correct');
                state.score++;
                state.mistakes = state.mistakes.filter(id => id !== q.id);
                
                const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
                feedback.innerText = ` ${randomComp}, ${state.firstName}!`;
                feedback.style.color = "var(--success)";
            } else {
                el.classList.add('wrong');
                opts[q.a].classList.add('correct');
                if(!state.mistakes.includes(q.id)) state.mistakes.push(q.id);
                
                const randomMot = motivation[Math.floor(Math.random() * motivation.length)];
                feedback.innerText = ` ${randomMot}, ${state.firstName}!`;
                feedback.style.color = "var(--error)";
            }
            
            if(q.e) {
                const exp = document.getElementById('explanation-box');
                exp.innerHTML = "<strong>Explanation:</strong><br>" + q.e;
                exp.style.display = 'block';
            }

            localStorage.setItem('mistakeBank', JSON.stringify(state.mistakes));
            document.getElementById('mistake-count').innerText = `(${state.mistakes.length})`;
            document.getElementById('next-btn').classList.remove('hidden');
        },

        next: () => {
            state.idx++;
            if(state.idx < state.currentSet.length) engine.render();
            else engine.end();
        },

        timer: () => {
            clearInterval(state.timerInt);
            state.timerInt = setInterval(() => {
                state.time--;
                let m = Math.floor(state.time / 60);
                let s = state.time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(state.time <= 0) engine.end();
            }, 1000);
        },

        end: () => {
            clearInterval(state.timerInt);
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-result').classList.remove('hidden');
            
            const total = state.currentSet.length;
            const accuracy = Math.round((state.score / total) * 100);
            
            // Normalize score to 50 for advice logic as requested
            const normalizedScore = (state.score / total) * 50;
            
            document.getElementById('res-score').innerText = `${state.score}/${total}`;
            document.getElementById('res-name-display').innerText = state.user;
            document.getElementById('res-accuracy').innerText = `Accuracy Percentage: ${accuracy}%`;

            let advice = "";
            if(normalizedScore <= 25) {
                advice = `You need to work much harder in your preparation, ${state.firstName}. Consistency is the bridge between goals and accomplishment.`;
            } else if (normalizedScore > 25 && normalizedScore <= 35) {
                advice = `That is a good score, ${state.firstName}, but aim for more to secure your position in the top ranks!`;
            } else {
                advice = `Excellent work, ${state.firstName}! Your technical grasp is superb. Maintain this momentum for the final exams.`;
            }
            
            document.getElementById('res-advice').innerText = advice;
        }
    };
</script>
</body>
</html>
